name: bench

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: grab ndk
        run: |
          curl -L https://dl.google.com/android/repository/android-ndk-r23b-linux.zip -o ndk-linux.zip
          unzip ndk-linux.zip > /dev/null 2>&1

      - name: compile via zigcc
        run: |
          pwd
          mkdir binaries

          zig cc -target aarch64-linux -s -Oz syscall_bench/bench.c -Wno-format -static -Wl,--gc-sections -o binaries/bench_arm64
          zig cc -target arm-linux -s -Oz syscall_bench/bench.c -Wno-format -static -Wl,--gc-sections -o binaries/bench_arm

          wc -c binaries/bench*
          file binaries/bench*

      - name: compile via ndk
        run: |
          echo "arm aarch64"
          pwd
          [ -f binaries ] && mkdir binaries

          ./android-ndk-r23b/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang -s -Oz syscall_bench/bench.c -Wl,--gc-sections -o binaries/bench_arm64-ndk
          ./android-ndk-r23b/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang -s -Oz syscall_bench/bench.c -Wl,--gc-sections -o binaries/bench_arm-ndk
          wc -c binaries/bench*ndk

          file binaries/bench*ndk


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: binaries/


